[workspace]
members = [
    "crates/rhizome-core",
    "crates/rhizome-treesitter",
    "crates/rhizome-lsp",
    "crates/rhizome-mcp",
    "crates/rhizome-cli",
]
resolver = "2"

[workspace.dependencies]
spore = { git = "https://github.com/basidiocarp/spore", rev = "8a04845e9bd1d471f42f4c07750865903459b18f" }
thiserror = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
