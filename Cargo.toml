[workspace]
members = [
    "crates/rhizome-core",
    "crates/rhizome-treesitter",
    "crates/rhizome-lsp",
    "crates/rhizome-mcp",
    "crates/rhizome-cli",
]
resolver = "2"

[workspace.dependencies]
spore = { path = "../spore" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
