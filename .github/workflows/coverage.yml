name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: basidiocarp/.github/.github/workflows/rust-coverage.yml@ac464bbd159bc15d40a4d496c44c1a8d77e3d50f
    with:
      threshold: 60
