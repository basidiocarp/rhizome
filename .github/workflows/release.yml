name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-linux)
        if: matrix.cross
        uses: taiki-e/install-action@v2.75.18
        with:
          tool: cross

      - name: Configure macOS SDK
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          set -euo pipefail
          for app in \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_15.4.app
          do
            if [ -d "$app/Contents/Developer" ]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"
          xcode-select -p
          xcodebuild -version
          clang --version

      - name: Build
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          elif [[ "${{ matrix.target }}" == *apple-darwin ]]; then
            export CARGO_BUILD_JOBS=1
            export CC_ENABLE_DEBUG_OUTPUT=1
            cargo build --release --target ${{ matrix.target }} -vv 2>&1 | tee build-${{ matrix.target }}.log
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Inspect macOS build diagnostics
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          set -euo pipefail
          LOG=build-${{ matrix.target }}.log
          echo "--- SDK ---"
          xcrun --sdk macosx --show-sdk-path
          echo "--- Relevant compiler lines ---"
          grep -E 'running: .*clang|running: .*cc|cargo:warning=' "$LOG" | sed -n '1,120p' || true
        shell: bash

      - name: Re-sign binary (macOS)
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          set -euo pipefail
          BINARY=target/${{ matrix.target }}/release/rhizome
          codesign --force --sign - "$BINARY"
          codesign -dv "$BINARY" 2>&1
        shell: bash

      - name: Smoke test (macOS native)
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          set -euo pipefail
          BINARY=target/${{ matrix.target }}/release/rhizome
          echo "--- L0: version check ---"
          "$BINARY" --version
          echo "--- L1: tree-sitter smoke (symbols) ---"
          "$BINARY" symbols crates/rhizome-cli/src/main.rs 2>&1 | tee smoke-${{ matrix.target }}.log
          grep -q 'fn main' smoke-${{ matrix.target }}.log
          echo "--- L2: MCP initialize ---"
          printf '%s' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"release-smoke","version":"0.1"}}}' \
            | "$BINARY" serve --expanded 2>&1 | tee -a smoke-${{ matrix.target }}.log
          grep -q 'protocolVersion' smoke-${{ matrix.target }}.log
        shell: bash

      - name: Upload macOS diagnostics
        if: failure() && (startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple'))
        uses: actions/upload-artifact@v7.0.0
        with:
          name: rhizome-${{ matrix.target }}-diagnostics
          path: |
            build-${{ matrix.target }}.log
            smoke-${{ matrix.target }}.log

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rhizome-${{ matrix.target }}.tar.gz rhizome
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../rhizome-${{ matrix.target }}.zip rhizome.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: rhizome-${{ matrix.target }}
          path: rhizome-${{ matrix.target }}.${{ matrix.archive }}

  packages:
    name: Linux packages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Install packaging tools
        uses: taiki-e/install-action@v2.75.18
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build DEB
        run: cargo deb --no-build -p rhizome-cli

      - name: Build RPM
        run: cargo generate-rpm -p crates/rhizome-cli

      - name: Upload DEB
        uses: actions/upload-artifact@v7.0.0
        with:
          name: rhizome-deb
          path: target/debian/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v7.0.0
        with:
          name: rhizome-rpm
          path: target/generate-rpm/*.rpm

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, packages]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Extract release notes from tag
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          body_path: /tmp/release-notes.md
          files: release/*
