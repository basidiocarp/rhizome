name: Performance guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  MAX_BINARY_SIZE_MB: 15
  MAX_STARTUP_MS: 15

jobs:
  performance:
    name: Binary size & startup time
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install hyperfine
        uses: taiki-e/install-action@hyperfine

      - name: Build release
        run: cargo build --release

      - name: Check binary size
        run: |
          SIZE_BYTES=$(stat --format=%s target/release/rhizome)
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "Binary size: ${SIZE_MB}MB"

          if (( $(echo "$SIZE_MB > $MAX_BINARY_SIZE_MB" | bc -l) )); then
            echo "::error::Binary size ${SIZE_MB}MB exceeds ${MAX_BINARY_SIZE_MB}MB limit"
            exit 1
          fi

          echo "### Binary size: ${SIZE_MB}MB (limit: ${MAX_BINARY_SIZE_MB}MB)" >> "$GITHUB_STEP_SUMMARY"

      - name: Benchmark startup
        run: |
          RESULT=$(hyperfine --warmup 5 --min-runs 20 \
            '${{ github.workspace }}/target/release/rhizome --version' \
            --export-json /tmp/bench.json 2>&1)
          echo "$RESULT"

          MEDIAN_MS=$(python3 -c "
          import json
          with open('/tmp/bench.json') as f:
              data = json.load(f)
          median_s = data['results'][0]['median']
          print(f'{median_s * 1000:.1f}')
          ")

          echo "Median startup: ${MEDIAN_MS}ms"

          if (( $(echo "$MEDIAN_MS > $MAX_STARTUP_MS" | bc -l) )); then
            echo "::error::Startup time ${MEDIAN_MS}ms exceeds ${MAX_STARTUP_MS}ms limit"
            exit 1
          fi

          echo "### Startup time: ${MEDIAN_MS}ms (limit: ${MAX_STARTUP_MS}ms)" >> "$GITHUB_STEP_SUMMARY"
