name: Performance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    uses: basidiocarp/.github/.github/workflows/rust-performance.yml@main
    with:
      binary: rhizome
      max-size-mb: 15
      max-startup-ms: 15
